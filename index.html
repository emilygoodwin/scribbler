<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Emily's Bakery</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@tensorflow/tfjs@4.0.0/dist/tf.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: #fef6e4;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    /* ── Loading screen ── */
    #loading-screen { text-align: center; max-width: 380px; width: 100%; }
    #loading-screen h2 {
      font-family: 'Pacifico', cursive;
      font-size: 2rem;
      color: #8b4513;
      margin-bottom: 8px;
    }
    #loading-screen .subtitle { color: #a0785a; margin-bottom: 24px; }
    #progress-container {
      background: #f0dcc8;
      border-radius: 8px;
      height: 14px;
      overflow: hidden;
      margin: 16px 0;
    }
    #progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #f4a261, #e76f51);
      border-radius: 8px;
      transition: width 0.4s ease;
    }
    #loading-status { color: #a0785a; font-size: 0.9rem; }
    #error-box {
      display: none;
      margin-top: 20px;
      padding: 16px;
      background: #fff0f0;
      border: 1px solid #fca5a5;
      border-radius: 10px;
      font-size: 0.85rem;
      color: #dc2626;
      line-height: 1.6;
    }

    /* ── Game screen ── */
    #game-screen { display: none; width: 100%; max-width: 440px; text-align: center; }

    /* Header */
    #header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 14px;
      background: #fff8f0;
      border-radius: 16px;
      border: 2px solid #f0dcc8;
      margin-bottom: 12px;
    }
    #shop-title { font-family: 'Pacifico', cursive; color: #8b4513; font-size: 1.05rem; }
    #level-badge {
      background: #f4a261;
      color: white;
      padding: 3px 12px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 700;
    }
    #score-display { font-weight: 900; color: #e76f51; font-size: 1.05rem; }
    #shop-btn {
      background: none;
      border: none;
      font-size: 1.3rem;
      cursor: pointer;
      padding: 2px 4px;
      line-height: 1;
    }

    /* Order ticket */
    /* Cake display */
    #cake-display {
      background: #fff8f0;
      border: 2px solid #f0dcc8;
      border-radius: 20px;
      padding: 14px 16px 16px;
      margin-bottom: 12px;
    }
    #cake-label {
      font-size: 0.88rem;
      color: #8b4513;
      margin-bottom: 12px;
    }
    #slots-container {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .letter-slot {
      width: 68px;
      height: 76px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }
    .letter-slot .letter { font-size: 2.4rem; line-height: 1; }

    .letter-slot.pending {
      background: #f0e8de;
      border: 2px solid #d4c4b0;
    }
    .letter-slot.pending .letter {
      color: #c4a882;
      font-weight: 900;
    }
    .letter-slot.active {
      background: #fff3e8;
      border: 2.5px solid #f4a261;
      animation: pulse 1.5s ease-in-out infinite;
    }
    .letter-slot.active .letter {
      color: #c47a3a;
      font-weight: 900;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 4px rgba(244,162,97,0.2); }
      50%       { box-shadow: 0 0 0 9px rgba(244,162,97,0.08); }
    }
    .letter-slot.done {
      background: #fff0eb;
      border: 2px solid #f9d4c4;
    }
    .letter-slot.done .letter {
      font-family: 'Pacifico', cursive;
      color: #e76f51;
    }

    /* ── Cupcake drawing area ── */
    #draw-area {
      background: transparent;
      border: none;
      padding: 0;
      margin-bottom: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #draw-label { font-size: 0.78rem; color: #c4956a; margin-bottom: 10px; }

    /* Frosting ring around the canvas */
    #frosting-ring {
      background: radial-gradient(circle at 30% 30%, #ffd6e7, #ffb3cc);
      border-radius: 50%;
      padding: 14px;
      box-shadow:
        0 4px 0 #e89ab5,
        0 0 0 4px #fff0f5,
        0 0 0 6px #ffd6e7;
      position: relative;
    }
    /* Sprinkles — only visible after upgrade */
    #frosting-ring::before,
    #frosting-ring::after {
      content: '';
      position: absolute;
      border-radius: 2px;
      opacity: 0;
      transition: opacity 0.4s;
    }
    #frosting-ring.has-sprinkles::before,
    #frosting-ring.has-sprinkles::after { opacity: 1; }
    #frosting-ring::before {
      width: 8px; height: 3px;
      background: #a8e6cf;
      top: 18%; left: 12%;
      transform: rotate(-30deg);
      box-shadow:
        30px  10px 0 2px #ffd93d,
        -10px 40px 0 2px #ff6b6b,
        50px  50px 0 2px #a8e6cf,
        10px  70px 0 2px #ffd93d,
        60px  20px 0 2px #ff6b6b,
        -5px  80px 0 2px #c7b3ff;
    }
    #frosting-ring::after {
      width: 6px; height: 3px;
      background: #ffd93d;
      top: 60%; right: 8%;
      transform: rotate(20deg);
      box-shadow:
        -40px -30px 0 2px #ff6b6b,
        -20px  20px 0 2px #a8e6cf,
        -60px   5px 0 2px #ffd93d,
        -15px -55px 0 2px #c7b3ff;
    }

    /* Color swatches */
    #color-selector {
      display: none;
      gap: 8px;
      margin-top: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }
    #color-selector.visible { display: flex; }
    .color-swatch {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      cursor: pointer;
      border: 3px solid transparent;
      transition: border-color 0.15s, transform 0.15s;
    }
    .color-swatch.selected { border-color: #8b4513; transform: scale(1.2); }

    /* Shop overlay */
    #shop-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #shop-overlay.show { display: flex; }
    #shop-card {
      background: #fff8f0;
      border-radius: 24px;
      padding: 24px 22px;
      max-width: 340px;
      width: 92%;
      border: 3px solid #f4a261;
    }
    #shop-card h2 {
      font-family: 'Pacifico', cursive;
      color: #8b4513;
      font-size: 1.5rem;
      margin-bottom: 16px;
    }
    .upgrade-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid #f0dcc8;
    }
    .upgrade-row:last-child { border-bottom: none; }
    .upgrade-icon { font-size: 1.8rem; flex-shrink: 0; }
    .upgrade-info { flex: 1; text-align: left; }
    .upgrade-name { font-weight: 900; color: #8b4513; font-size: 0.95rem; }
    .upgrade-desc { font-size: 0.78rem; color: #a0785a; margin-top: 1px; }
    .upgrade-btn {
      padding: 6px 14px;
      font-size: 0.82rem;
      flex-shrink: 0;
    }
    .upgrade-btn.owned  { background: #d4f0e0; color: #2d9e6b; }
    .upgrade-btn.affordable { background: #f4a261; color: white; }
    .upgrade-btn.affordable:hover { background: #e07e3a; }
    .upgrade-btn.costly { background: #f0e8de; color: #b0907a; cursor: not-allowed; }
    #shop-close {
      margin-top: 16px;
      width: 100%;
      background: #f0e8de;
      color: #8b4513;
    }

    canvas {
      border-radius: 50%;
      background: #fffcf9;
      touch-action: none;
      cursor: crosshair;
      display: block;
      /* display size — scales up for iPad while keeping 280×280 internal resolution */
      width: min(68vw, 280px);
      height: min(68vw, 280px);
    }

    /* Cupcake liner below the frosting */
    #cake-liner {
      width: min(72vw, 300px);
      background: repeating-linear-gradient(
        to right,
        #e8c49a 0px, #e8c49a 10px,
        #d4a574 10px, #d4a574 20px
      );
      height: 64px;
      clip-path: polygon(6% 0%, 94% 0%, 100% 100%, 0% 100%);
      margin-top: -2px;
      border-radius: 0 0 8px 8px;
      position: relative;
    }
    /* Liner top ridge */
    #cake-liner::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 8px;
      background: #c49060;
    }

    #controls { margin-top: 10px; }
    button {
      padding: 7px 20px;
      border: none;
      border-radius: 20px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      background: #f0e8de;
      color: #8b4513;
      transition: background 0.15s;
    }
    button:hover { background: #e0d0c0; }

    /* Feedback */
    #feedback { min-height: 1.6rem; font-size: 1rem; font-weight: 700; }
    .feedback-correct { color: #2d9e6b; }
    .feedback-wrong   { color: #e63946; }

    /* Promotion overlay */
    #promo-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #promo-overlay.show { display: flex; }
    #promo-card {
      background: #fff8f0;
      border-radius: 24px;
      padding: 32px 28px;
      text-align: center;
      max-width: 320px;
      width: 90%;
      border: 3px solid #f4a261;
    }
    #promo-card h2 {
      font-family: 'Pacifico', cursive;
      color: #8b4513;
      font-size: 1.7rem;
      margin-bottom: 10px;
    }
    #promo-card p { color: #a0785a; margin-bottom: 22px; line-height: 1.5; }
    #promo-card button {
      background: #f4a261;
      color: white;
      padding: 10px 28px;
      font-size: 1rem;
    }
    #promo-card button:hover { background: #e07e3a; }

    /* Score popup */
    .score-popup {
      position: fixed;
      font-size: 1.4rem;
      font-weight: 900;
      color: #e76f51;
      pointer-events: none;
      z-index: 999;
      font-family: 'Nunito', sans-serif;
      animation: floatUp 0.9s ease-out forwards;
    }
    @keyframes floatUp {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-60px) scale(1.2); }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-10px); }
      60%       { transform: translateX(10px); }
    }
    .shake { animation: shake 0.3s ease; }

    /* ── Tutorial overlay ── */
    #tutorial-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 200;
      align-items: flex-end;
      justify-content: center;
      padding: 24px;
    }
    #tutorial-overlay.show { display: flex; }
    #tutorial-bubble {
      background: #fff8f0;
      border: 3px solid #f4a261;
      border-radius: 24px;
      padding: 20px 20px 16px;
      max-width: 360px;
      width: 100%;
      position: relative;
    }
    #tutorial-bubble::after {
      content: '👨‍🍳';
      position: absolute;
      font-size: 3rem;
      bottom: calc(100% - 4px);
      left: 20px;
    }
    #tutorial-bubble p {
      font-size: 1rem;
      color: #5a3010;
      line-height: 1.55;
      margin-bottom: 16px;
      padding-top: 8px;
    }
    #tutorial-bubble button {
      background: #f4a261;
      color: white;
      padding: 9px 24px;
      font-size: 0.95rem;
      float: right;
    }
    #tutorial-bubble button:hover { background: #e07e3a; }
    #tutorial-bubble::before {
      content: '';
      display: block;
      clear: both;
    }
  </style>
</head>
<body>

<!-- Loading screen -->
<div id="loading-screen">
  <h2>Emily's Bakery 🎂</h2>
  <p class="subtitle">Warming up the ovens…</p>
  <div id="progress-container"><div id="progress-bar"></div></div>
  <p id="loading-status">Getting ready…</p>
  <div id="error-box">
    Something went wrong loading the game. Try refreshing the page!
  </div>
</div>

<!-- Game screen -->
<div id="game-screen">

  <div id="header">
    <span id="shop-title">Emily's Bakery</span>
    <span id="level-badge">Apprentice</span>
    <span id="score-display">$0</span>
    <button id="shop-btn" onclick="openShop()" title="Upgrade Shop">🛍️</button>
  </div>

  <div id="cake-display">
    <div id="cake-label">📋 New order: <strong id="order-desc">a cupcake</strong> that says:</div>
    <div id="slots-container"></div>
  </div>

  <div id="draw-area">
    <div id="draw-label">Pipe your letter in the frosting ↓</div>
    <div id="frosting-ring">
      <canvas id="canvas" width="280" height="280"></canvas>
    </div>
    <div id="cake-liner"></div>
    <div id="color-selector"></div>
    <div id="controls">
      <button onclick="clearCanvas()">Clear</button>
    </div>
  </div>

  <div id="feedback"></div>

</div>

<!-- Tutorial overlay -->
<div id="tutorial-overlay">
  <div id="tutorial-bubble">
    <p id="tutorial-msg"></p>
    <button id="tutorial-btn" onclick="nextTutorialStep()">Got it!</button>
  </div>
</div>

<!-- Shop overlay -->
<div id="shop-overlay">
  <div id="shop-card">
    <h2>🛍️ Upgrade Shop</h2>
    <div id="upgrade-list"></div>
    <button id="shop-close" onclick="closeShop()">Back to baking!</button>
  </div>
</div>

<!-- Promotion overlay -->
<div id="promo-overlay">
  <div id="promo-card">
    <h2>Promoted! 🎉</h2>
    <p id="promo-text"></p>
    <button onclick="dismissPromo()">Let's bake!</button>
  </div>
</div>

<script>
// ── Word lists ─────────────────────────────────────────────────────────────────
const WORD_LISTS = {
  1: 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz'.split(''),
  2: ['an','as','at','be','by','do','go','he','if','in','is','it','me','my','no','of','on','or','so','to','up','us','we'],
  3: ['all','and','are','big','but','can','did','for','fun','get','got','had','has','her','him','his','how','let','not','now','old','one','our','out','own','ran','red','run','saw','say','see','she','sit','six','ten','the','too','two','use','was','way','who','why','yes','yet','you'],
  4: ['away','been','blue','call','came','come','find','five','four','from','give','good','have','help','here','home','into','jump','just','keep','kind','know','like','live','long','look','made','make','many','must','need','open','over','play','pull','read','ride','said','same','show','sing','slow','some','soon','stop','take','tell','that','them','then','they','this','time','told','turn','very','walk','want','warm','wash','went','were','when','will','wish','with','work','year','your'],
};

// ── Levels ─────────────────────────────────────────────────────────────────────
// threshold: score needed to reach this level
const LEVELS = [
  { title: 'Apprentice', wordLen: 1, pts: 10, threshold: 0,   item: 'cupcake'          },
  { title: 'Assistant',  wordLen: 2, pts: 25, threshold: 150, item: 'small cake'        },
  { title: 'Decorator',  wordLen: 3, pts: 50, threshold: 400, item: 'layer cake'        },
  { title: 'Head Baker', wordLen: 4, pts: 80, threshold: 800, item: 'celebration cake'  },
];

// ── Constants ─────────────────────────────────────────────────────────────────
const MODEL_KEY   = 'emnist-letters-v1';
const LETTERS     = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
const MIN_STROKES = { 'i': 2, 'I': 2, 't': 2, 'T': 2 };
const STROKE_HINT = { 'i': 'Now add the dot!', 'I': 'Now add the dot!', 't': 'Now add the crossbar!', 'T': 'Now add the crossbar!' };

// ── Upgrades & frosting colors ────────────────────────────────────────────────
// Pink is always available for free; others are purchased individually.
const FROSTING_COLORS = [
  { id: 'pink',      name: 'Pink',      free: true, bg: 'radial-gradient(circle at 30% 30%, #ffd6e7, #ffb3cc)', shadow: '#e89ab5, 0 0 0 4px #fff0f5, 0 0 0 6px #ffd6e7', pen: '#c45a82' },
  { id: 'chocolate', name: 'Chocolate', cost: 10,   bg: 'radial-gradient(circle at 30% 30%, #a06040, #7a4020)', shadow: '#5a2e10, 0 0 0 4px #fff5f0, 0 0 0 6px #c08060', pen: '#5a2e10' },
  { id: 'blue',      name: 'Blue',      cost: 100,  bg: 'radial-gradient(circle at 30% 30%, #bde0fe, #90c7f7)', shadow: '#6aabec, 0 0 0 4px #f0f7ff, 0 0 0 6px #bde0fe', pen: '#3a80c8' },
  { id: 'mint',      name: 'Mint',      cost: 100,  bg: 'radial-gradient(circle at 30% 30%, #b7f5c8, #7de49a)', shadow: '#5bc97a, 0 0 0 4px #f0fff5, 0 0 0 6px #b7f5c8', pen: '#2a9a58' },
  { id: 'purple',    name: 'Purple',    cost: 100,  bg: 'radial-gradient(circle at 30% 30%, #d4b3ff, #b388ff)', shadow: '#9c6fdb, 0 0 0 4px #f8f0ff, 0 0 0 6px #d4b3ff', pen: '#7a4dc8' },
  { id: 'yellow',    name: 'Yellow',    cost: 100,  bg: 'radial-gradient(circle at 30% 30%, #fff3b0, #ffe066)', shadow: '#e6c832, 0 0 0 4px #fffdf0, 0 0 0 6px #fff3b0', pen: '#b89010' },
  { id: 'orange',    name: 'Orange',    cost: 100,  bg: 'radial-gradient(circle at 30% 30%, #ffd6a5, #ffb347)', shadow: '#e0922a, 0 0 0 4px #fff8f0, 0 0 0 6px #ffd6a5', pen: '#c06010' },
];

const SPRINKLE_UPGRADE = { id: 'sprinkles', icon: '🍬', name: 'Sprinkles', cost: 50, desc: 'Add colorful sprinkles to your frosting!' };

const purchased     = new Set();
let selectedColorId = 'pink';

// ── State ─────────────────────────────────────────────────────────────────────
let model          = null;
let score          = 0;
let levelIdx       = 0;
let currentWord    = '';
let currentSlot    = 0;
let awaitingResult   = false;
let pendingPromo     = false;
let strokeCount      = 0;
let canvasSnapshot   = null;
let tutorialStep     = 0;   // 0 = not started, 1 = step 1 shown, 2 = done
let firstOrderDone   = false;

// ── DOM refs ──────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const loadingScreen  = $('loading-screen');
const gameScreen     = $('game-screen');
const progressBar    = $('progress-bar');
const statusEl       = $('loading-status');
const slotsContainer = $('slots-container');
const orderDesc      = $('order-desc');
const feedbackEl     = $('feedback');
const scoreEl        = $('score-display');
const levelBadge     = $('level-badge');
const canvas         = $('canvas');
const ctx            = canvas.getContext('2d');
const promoOverlay   = $('promo-overlay');
const promoText      = $('promo-text');

// Hidden canvas — receives only the current stroke; sent to classifier.
// The visible canvas accumulates all strokes so previous letters stay visible.
const workCanvas = document.createElement('canvas');
workCanvas.width  = canvas.width;
workCanvas.height = canvas.height;
const wctx = workCanvas.getContext('2d');

// ── Canvas setup ──────────────────────────────────────────────────────────────
function setupCtx(c) {
  c.lineWidth   = 20;
  c.lineCap     = 'round';
  c.lineJoin    = 'round';
  c.strokeStyle = '#3d2314';
}
setupCtx(ctx);
setupCtx(wctx);
ctx.fillStyle  = '#fffcf9';  ctx.fillRect(0, 0, canvas.width, canvas.height);
wctx.fillStyle = '#fff';     wctx.fillRect(0, 0, canvas.width, canvas.height);

// ── Model loading ──────────────────────────────────────────────────────────────
async function tryLoadFile() {
  try { return await tf.loadLayersModel('./model/model.json'); } catch { return null; }
}
async function tryLoadCached() {
  try { return await tf.loadLayersModel(`indexeddb://${MODEL_KEY}`); } catch { return null; }
}

// ── Level helpers ─────────────────────────────────────────────────────────────
function calcLevelIdx() {
  let idx = 0;
  for (let i = 0; i < LEVELS.length; i++) {
    if (score >= LEVELS[i].threshold) idx = i;
  }
  return idx;
}

function pickWord(len) {
  const list = WORD_LISTS[len];
  return list[Math.floor(Math.random() * list.length)];
}

// ── Slot rendering ────────────────────────────────────────────────────────────
function renderSlots() {
  slotsContainer.innerHTML = '';
  for (let i = 0; i < currentWord.length; i++) {
    const slot = document.createElement('div');
    slot.className = 'letter-slot ' + (i < currentSlot ? 'done' : i === currentSlot ? 'active' : 'pending');
    const letter = document.createElement('div');
    letter.className = 'letter';
    letter.textContent = currentWord[i];
    slot.appendChild(letter);
    slotsContainer.appendChild(slot);
  }
}

// ── New order ─────────────────────────────────────────────────────────────────
function newOrder() {
  const lvl   = LEVELS[levelIdx];
  currentWord = pickWord(lvl.wordLen);
  currentSlot = 0;
  awaitingResult = false;

  levelBadge.textContent = lvl.title;
  orderDesc.textContent = `a ${lvl.item}`;

  renderSlots();
  clearAll();
  saveSnapshot();
  feedbackEl.textContent = '';
  feedbackEl.className   = '';
}

// ── Prediction ────────────────────────────────────────────────────────────────
async function runPrediction() {
  if (!model || awaitingResult) return;
  awaitingResult = true;

  const predTensor = tf.tidy(() => model.predict(canvasToTensor()));
  const probs      = Array.from(await predTensor.data());
  predTensor.dispose();

  const classIdx = probs.indexOf(Math.max(...probs));
  const target   = currentWord[currentSlot];
  const correct  = classIdx === target.toUpperCase().charCodeAt(0) - 65;

  if (correct) {
    currentSlot++;
    clearWork();

    if (currentSlot >= currentWord.length) {
      // ── Order complete ──
      renderSlots();
      const pts = LEVELS[levelIdx].pts;
      score    += pts;
      scoreEl.textContent = `$${score}`;
      feedbackEl.textContent = '🎂 Order done!';
      feedbackEl.className   = 'feedback-correct';
      spawnScorePopup(pts);

      const newIdx = calcLevelIdx();
      if (newIdx > levelIdx) {
        levelIdx     = newIdx;
        pendingPromo = true;
      }

      const isFirstOrder = !firstOrderDone;
      firstOrderDone = true;

      setTimeout(() => {
        if (isFirstOrder) {
          showShopHint();
          newOrder();
        } else if (pendingPromo) {
          pendingPromo = false;
          showPromo();
        } else {
          newOrder();
        }
      }, 900);

    } else {
      // ── Next letter ──
      renderSlots();
      saveSnapshot();
      feedbackEl.textContent = '✓ Keep going!';
      feedbackEl.className   = 'feedback-correct';
      awaitingResult         = false;
    }

  } else {
    feedbackEl.textContent = 'Keep trying!';
    feedbackEl.className   = 'feedback-wrong';
    canvas.classList.add('shake');
    canvas.addEventListener('animationend', () => canvas.classList.remove('shake'), { once: true });
    awaitingResult = false;
  }
}

// ── Promotion ─────────────────────────────────────────────────────────────────
function showPromo() {
  const lvl     = LEVELS[levelIdx];
  const prevPts = LEVELS[levelIdx - 1].pts;
  const morePts = lvl.pts - prevPts;
  promoText.textContent = `You're now a ${lvl.title}! `
    + `Time to decorate ${lvl.item}s with whole words. `
    + `These orders earn $${morePts} more per order — $${lvl.pts} each!`;
  promoOverlay.classList.add('show');
}

function dismissPromo() {
  promoOverlay.classList.remove('show');
  newOrder();
}

// ── Score popup ───────────────────────────────────────────────────────────────
function spawnScorePopup(pts) {
  const rect = canvas.getBoundingClientRect();
  const el   = document.createElement('div');
  el.className   = 'score-popup';
  el.textContent = `+$${pts}`;
  el.style.left  = (rect.left + rect.width / 2 - 24) + 'px';
  el.style.top   = (rect.top - 10) + 'px';
  document.body.appendChild(el);
  el.addEventListener('animationend', () => el.remove());
}

// ── Canvas drawing ────────────────────────────────────────────────────────────
let drawing = false;

function getPos(e) {
  const rect   = canvas.getBoundingClientRect();
  const scaleX = canvas.width  / rect.width;
  const scaleY = canvas.height / rect.height;
  const src    = e.touches ? e.touches[0] : e;
  return {
    x: (src.clientX - rect.left) * scaleX,
    y: (src.clientY - rect.top)  * scaleY,
  };
}

function onDown(e) {
  e.preventDefault();
  drawing = true;
  const p = getPos(e);
  ctx.beginPath();  ctx.moveTo(p.x, p.y);
  wctx.beginPath(); wctx.moveTo(p.x, p.y);
}
function onMove(e) {
  e.preventDefault();
  if (!drawing) return;
  const p = getPos(e);
  ctx.lineTo(p.x, p.y);   ctx.stroke();
  wctx.lineTo(p.x, p.y);  wctx.stroke();
}
function onUp(e) {
  e.preventDefault();
  drawing = false;
  strokeCount++;
  const target = currentWord[currentSlot];
  const needed = MIN_STROKES[target] || 1;
  if (strokeCount < needed) {
    feedbackEl.textContent = STROKE_HINT[target];
    feedbackEl.className   = '';
    return;
  }
  runPrediction();
}

canvas.addEventListener('mousedown',  onDown, { passive: false });
canvas.addEventListener('mousemove',  onMove, { passive: false });
canvas.addEventListener('mouseup',    onUp,   { passive: false });
canvas.addEventListener('touchstart', onDown, { passive: false });
canvas.addEventListener('touchmove',  onMove, { passive: false });
canvas.addEventListener('touchend',   onUp,   { passive: false });

function saveSnapshot() {
  canvasSnapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
}
// Between correct letters: leave display canvas alone, only reset the work canvas
function clearWork() {
  wctx.fillStyle = '#fff';
  wctx.fillRect(0, 0, canvas.width, canvas.height);
  strokeCount = 0;
}
// Clear both canvases (new order)
function clearAll() {
  ctx.fillStyle  = '#fffcf9';  ctx.fillRect(0, 0, canvas.width, canvas.height);
  wctx.fillStyle = '#fff';     wctx.fillRect(0, 0, canvas.width, canvas.height);
  strokeCount = 0;
  canvasSnapshot = null;
}
// Clear button — restore display to snapshot (undo current letter), reset work canvas
function clearCanvas() {
  if (canvasSnapshot) ctx.putImageData(canvasSnapshot, 0, 0);
  clearWork();
}

// ── Canvas → tensor ───────────────────────────────────────────────────────────
function canvasToTensor() {
  const full = wctx.getImageData(0, 0, canvas.width, canvas.height).data;
  let minX = canvas.width, maxX = -1, minY = canvas.height, maxY = -1;
  for (let y = 0; y < canvas.height; y++) {
    for (let x = 0; x < canvas.width; x++) {
      const i = (y * canvas.width + x) * 4;
      if ((full[i] + full[i+1] + full[i+2]) / 3 < 200) {
        if (x < minX) minX = x; if (x > maxX) maxX = x;
        if (y < minY) minY = y; if (y > maxY) maxY = y;
      }
    }
  }
  const tmp  = document.createElement('canvas');
  tmp.width  = tmp.height = 28;
  const tctx = tmp.getContext('2d');
  tctx.fillStyle = '#fff';
  tctx.fillRect(0, 0, 28, 28);
  if (maxX >= minX) {
    const size = Math.max(maxX - minX + 1, maxY - minY + 1);
    const pad  = Math.round(size * 0.2);
    const cx   = (minX + maxX) / 2;
    const cy   = (minY + maxY) / 2;
    const src  = size + pad * 2;
    tctx.drawImage(workCanvas, cx - src/2, cy - src/2, src, src, 0, 0, 28, 28);
  } else {
    tctx.drawImage(workCanvas, 0, 0, 28, 28);
  }
  const d   = tctx.getImageData(0, 0, 28, 28).data;
  const raw = new Float32Array(28 * 28);
  for (let i = 0; i < d.length; i += 4)
    raw[i/4] = 1 - (d[i] + d[i+1] + d[i+2]) / 3 / 255;
  return tf.tensor4d(raw, [1, 28, 28, 1]);
}

// ── Tutorial ──────────────────────────────────────────────────────────────────
const TUTORIAL_STEPS = [
  {
    msg: "Welcome to the bakery! 🎂 Since this is your first day as an apprentice, we'll start with one-letter cupcakes while you get the hang of things.",
    btn: "Sounds good!",
  },
  {
    msg: "Draw the letter shown on the cupcake below. When you're done drawing, I'll check if it's right!",
    btn: "Let's bake! 🎂",
  },
];

function showTutorial() {
  tutorialStep = 0;
  showTutorialStep();
}

function showTutorialStep() {
  const step = TUTORIAL_STEPS[tutorialStep];
  $('tutorial-msg').textContent = step.msg;
  $('tutorial-btn').textContent = step.btn;
  $('tutorial-overlay').classList.add('show');
}

function nextTutorialStep() {
  tutorialStep++;
  if (tutorialStep < TUTORIAL_STEPS.length) {
    showTutorialStep();
  } else {
    $('tutorial-overlay').classList.remove('show');
  }
}

function showShopHint() {
  $('tutorial-msg').textContent =
    "Great work! 🌟 You earned $10 — just enough to buy Chocolate Frosting in the shop! Tap 🛍️ to check it out.";
  $('tutorial-btn').textContent = "Show me! 🛍️";
  $('tutorial-btn').onclick = () => {
    $('tutorial-overlay').classList.remove('show');
    $('tutorial-btn').onclick = nextTutorialStep; // restore default
    openShop();
  };
  $('tutorial-overlay').classList.add('show');
}

// ── Upgrade shop ──────────────────────────────────────────────────────────────
function selectColor(id) {
  selectedColorId = id;
  const c = FROSTING_COLORS.find(c => c.id === id);
  const ring = $('frosting-ring');
  ring.style.background = c.bg;
  ring.style.boxShadow  = `0 4px 0 ${c.shadow}`;
  ctx.strokeStyle  = c.pen;
  wctx.strokeStyle = c.pen;
  // Update swatch selection highlight
  $('color-selector').querySelectorAll('.color-swatch')
    .forEach(s => s.classList.toggle('selected', s.dataset.id === id));
}

function rebuildColorSelector() {
  const sel = $('color-selector');
  sel.innerHTML = '';
  const available = FROSTING_COLORS.filter(c => c.free || purchased.has(c.id));
  if (available.length <= 1) { sel.classList.remove('visible'); return; }
  sel.classList.add('visible');
  available.forEach(c => {
    const swatch = document.createElement('button');
    swatch.className        = 'color-swatch' + (c.id === selectedColorId ? ' selected' : '');
    swatch.style.background = c.bg;
    swatch.dataset.id       = c.id;
    swatch.title            = c.name;
    swatch.onclick          = () => selectColor(c.id);
    sel.appendChild(swatch);
  });
}

function renderShop() {
  const list = $('upgrade-list');
  list.innerHTML = '';
  // Sprinkles row
  const s = SPRINKLE_UPGRADE;
  const sOwned = purchased.has(s.id);
  const sAfford = score >= s.cost;
  const sRow = document.createElement('div');
  sRow.className = 'upgrade-row';
  sRow.innerHTML = `
    <span class="upgrade-icon">${s.icon}</span>
    <div class="upgrade-info">
      <div class="upgrade-name">${s.name}</div>
      <div class="upgrade-desc">${s.desc}</div>
    </div>
    <button class="upgrade-btn ${sOwned ? 'owned' : sAfford ? 'affordable' : 'costly'}"
            ${sOwned || !sAfford ? 'disabled' : `onclick="buyUpgrade('sprinkles')"`}>
      ${sOwned ? 'Owned' : `$${s.cost}`}
    </button>`;
  list.appendChild(sRow);
  // Color rows
  FROSTING_COLORS.filter(c => !c.free).forEach(c => {
    const owned   = purchased.has(c.id);
    const afford  = score >= c.cost;
    const row = document.createElement('div');
    row.className = 'upgrade-row';
    row.innerHTML = `
      <span class="upgrade-icon" style="background:${c.bg};border-radius:50%;width:2rem;height:2rem;display:inline-flex;align-items:center;justify-content:center;">🎨</span>
      <div class="upgrade-info">
        <div class="upgrade-name">${c.name} Frosting</div>
        <div class="upgrade-desc">Pipe in ${c.name.toLowerCase()} — pen color changes too!</div>
      </div>
      <button class="upgrade-btn ${owned ? 'owned' : afford ? 'affordable' : 'costly'}"
              ${owned || !afford ? 'disabled' : `onclick="buyUpgrade('${c.id}')"`}>
        ${owned ? 'Owned' : `$${c.cost}`}
      </button>`;
    list.appendChild(row);
  });
}

function buyUpgrade(id) {
  if (purchased.has(id)) return;
  const item = id === 'sprinkles'
    ? SPRINKLE_UPGRADE
    : FROSTING_COLORS.find(c => c.id === id);
  if (!item || score < item.cost) return;
  score -= item.cost;
  scoreEl.textContent = `$${score}`;
  purchased.add(id);
  if (id === 'sprinkles') {
    $('frosting-ring').classList.add('has-sprinkles');
  } else {
    rebuildColorSelector();
    selectColor(id); // auto-switch to the newly bought color
  }
  renderShop();
}

function openShop()  { renderShop(); $('shop-overlay').classList.add('show'); }
function closeShop() { $('shop-overlay').classList.remove('show'); }

// ── UI helpers ────────────────────────────────────────────────────────────────
function setProgress(pct) { progressBar.style.width = pct + '%'; }
function setStatus(msg)    { statusEl.textContent = msg; }

// ── Boot ──────────────────────────────────────────────────────────────────────
async function init() {
  setStatus('Opening the shop…');
  setProgress(5);

  let m = await tryLoadFile();
  if (m) {
    setProgress(100);
  } else {
    setStatus('Checking for saved recipe…');
    m = await tryLoadCached();
    if (m) {
      setProgress(100);
    } else {
      setStatus('Could not load — please try refreshing!');
      $('error-box').style.display = 'block';
      return;
    }
  }

  model = m;
  await tf.nextFrame();
  loadingScreen.style.display = 'none';
  gameScreen.style.display    = 'block';
  newOrder();
  showTutorial();
}

init();
</script>
